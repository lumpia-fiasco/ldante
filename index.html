<!DOCTYPE html>

<body>

  <main>

    <!-- ─── Hero ─── -->
    <section class="hero" id="hero">

      <!-- Left: identity content -->
      <div class="hero-left">
        <div class="hero-logo" id="heroLogo" role="img" aria-label="LDG Logo">
          <svg viewBox="0 0 864 459" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <polygon fill="currentColor" points="36 432 221.36 432 36 27.57 36 432"/>
            <path fill="currentColor" d="M221.36,27.57v404.43c111.68,0,202.21-90.53,202.21-202.21S333.04,27.57,221.36,27.57Z"/>
            <path fill="currentColor" d="M625.79,229.79V27.57c-111.68,0-202.21,90.53-202.21,202.21,0,13.96,1.41,27.59,4.11,40.75,1.01,4.94,2.2,9.81,3.56,14.61,1.82,6.4,3.94,12.67,6.36,18.79,8.45,21.43,20.45,41.07,35.28,58.19,2.12,2.45,4.3,4.84,6.53,7.18,2.23,2.34,4.52,4.63,6.86,6.86,2.34,2.23,4.74,4.41,7.18,6.53,4.89,4.24,9.99,8.24,15.27,12,11.89,8.46,24.74,15.66,38.35,21.42,3.02,1.28,6.09,2.49,9.18,3.62,21.68,7.94,45.1,12.27,69.53,12.27,111.68,0,202.21-90.53,202.21-202.21h-202.21Z"/>
          </svg>
        </div>
        <p class="hero-tagline">I think in systems.</p>
        <p class="hero-desc">I'm building an AI-enabled mobile platform that explores the relationships between customer and business.</p>
      </div>

      <!-- Right: name prompt (balloon) -->
      <div class="hero-right" id="namePrompt">
        <p class="name-question">Hi, what's<br>your name?</p>
        <div class="name-input-wrap">
          <input
            class="name-input"
            id="nameInput"
            type="text"
            placeholder="your name"
            autocomplete="off"
            spellcheck="false"
            maxlength="40"
          >
        </div>
        <p class="name-hint">press Enter ↵</p>
      </div>

    </section>

    <!-- ─── Conversation (shown after name entry) ─── -->
    <section class="convo" id="convo" aria-live="polite">
      <div class="convo-inner" id="convoInner"></div>
    </section>

  </main>

  <script>
    // ─── Sky color animation ──────────────────────────────────────────────────
    const logo = document.getElementById('heroLogo');

    const skyColors = [
      '#cae7ed','#ffcb69','#ff9a3c','#ff6b6b','#ffd166',
      '#90e0ef','#00b4d8','#caf0f8','#fca652','#f15946',
      '#a0325f','#3d2b56','#0d1321',
    ];

    let rafId = null, t = 0, hover = false;

    function hexToRgb(hex) {
      return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
    }
    function lerp(a,b,t){ return Math.round(a+(b-a)*t); }
    function colorAt(p) {
      const n = skyColors.length-1;
      const pos = Math.min(p*n, n-0.0001);
      const idx = Math.floor(pos), frac = pos-idx;
      const [r1,g1,b1] = hexToRgb(skyColors[idx]);
      const [r2,g2,b2] = hexToRgb(skyColors[idx+1]);
      return `rgb(${lerp(r1,r2,frac)},${lerp(g1,g2,frac)},${lerp(b1,b2,frac)})`;
    }
    function tick() {
      t = hover ? Math.min(t+0.0003,1) : Math.max(t-0.0006,0);
      document.body.style.backgroundColor = colorAt(t);
      const keep = (hover && t<1) || (!hover && t>0);
      rafId = keep ? requestAnimationFrame(tick) : null;
    }

    // ─── Logo hover: scale + tagline push ────────────────────────────────────
    const tagline = document.querySelector('.hero-tagline');
    const PUSH = (1.3 - 1) * 100 / 2; // 15px — logo scales from center

    logo.addEventListener('mouseenter', () => {
      hover = true;
      if (!rafId) rafId = requestAnimationFrame(tick);
      tagline.style.transform = `translateY(${PUSH}px)`;
    });
    logo.addEventListener('mouseleave', () => {
      hover = false;
      if (!rafId) rafId = requestAnimationFrame(tick);
      tagline.style.transform = 'translateY(0)';
    });

    // ─── Auto-focus name input after balloon arrives ──────────────────────────
    setTimeout(() => {
      const input = document.getElementById('nameInput');
      if (input) input.focus();
    }, 2000);

    // ─── Name submission → conversation ──────────────────────────────────────
    document.getElementById('nameInput').addEventListener('keydown', function(e) {
      if (e.key !== 'Enter') return;
      const name = this.value.trim();
      if (!name) return;
      startConversation(name);
    });

    // ─── AI chat state ────────────────────────────────────────────────────────
    let visitorName = '';
    let chatHistory = [];  // { role: 'user'|'assistant', content: string }
    let aiLocked = false;  // prevent double-sends while waiting

    function startConversation(name) {
      visitorName = name;
      const hero = document.getElementById('hero');
      const convo = document.getElementById('convo');

      hero.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
      hero.style.opacity = '0';
      hero.style.transform = 'scale(0.98)';

      setTimeout(() => {
        hero.style.display = 'none';
        convo.classList.add('active');

        // Scripted opener — always the same, not counted in AI history
        addDanteMsg(`Hey <strong>${esc(name)}</strong>, how're ya doin?`, 0);
        addDanteMsg(`How can I help you? I can tell you about my work, and how I tackle certain situations. Hit me.`, 1400);

        setTimeout(() => {
          initChatInput();
        }, 1400 + 700 + 500);
      }, 520);
    }

    // ─── Dante message bubble (left, with avatar) ─────────────────────────────
    function addDanteMsg(html, delay = 0) {
      const inner = document.getElementById('convoInner');
      const row = document.createElement('div');
      row.className = 'msg';
      row.innerHTML = `
        <img class="msg-avatar" src="assets/profile.png" alt="Dante">
        <div class="msg-bubble">
          <div class="msg-dot-wrap" aria-hidden="true"><span></span><span></span><span></span></div>
          <p class="msg-text">${html}</p>
        </div>`;
      inner.appendChild(row);
      setTimeout(() => row.classList.add('typing'), delay);
      setTimeout(() => { row.classList.remove('typing'); row.classList.add('visible'); }, delay + 700);
      return row;
    }

    // ─── User message bubble (right) ─────────────────────────────────────────
    function addUserMsg(text) {
      const inner = document.getElementById('convoInner');
      const row = document.createElement('div');
      row.className = 'msg msg--user';
      row.innerHTML = `<p class="msg-text">${esc(text)}</p>`;
      inner.appendChild(row);
      requestAnimationFrame(() => requestAnimationFrame(() => row.classList.add('visible')));
      return row;
    }

    // ─── AI call ─────────────────────────────────────────────────────────────
    async function sendToAI(userText, afterFn) {
      if (aiLocked) return;
      aiLocked = true;

      chatHistory.push({ role: 'user', content: userText });

      // Typing placeholder
      const inner = document.getElementById('convoInner');
      const row = document.createElement('div');
      row.className = 'msg';
      row.innerHTML = `
        <img class="msg-avatar" src="assets/profile.png" alt="Dante">
        <div class="msg-bubble">
          <div class="msg-dot-wrap" aria-hidden="true"><span></span><span></span><span></span></div>
          <p class="msg-text"></p>
        </div>`;
      inner.appendChild(row);
      requestAnimationFrame(() => requestAnimationFrame(() => row.classList.add('typing')));
      row.scrollIntoView({ behavior: 'smooth', block: 'end' });

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: chatHistory, name: visitorName }),
        });

        if (!res.ok) throw new Error(res.statusText);
        const data = await res.json();
        const text = data.text || data.error || 'Hmm, something broke on my end.';

        row.classList.remove('typing');
        row.querySelector('.msg-text').innerHTML = safeHtml(text);
        row.classList.add('visible');
        chatHistory.push({ role: 'assistant', content: text });
        row.scrollIntoView({ behavior: 'smooth', block: 'end' });

        if (afterFn) afterFn();
      } catch (err) {
        row.classList.remove('typing');
        row.querySelector('.msg-text').textContent = "My server seems to be asleep — try again in a sec.";
        row.classList.add('visible');
      } finally {
        aiLocked = false;
      }
    }

    // ─── Option buttons ───────────────────────────────────────────────────────
    function showOptions(name) {
      const inner = document.getElementById('convoInner');
      const optRow = document.createElement('div');
      optRow.className = 'msg-options';
      optRow.innerHTML = `
        <button class="opt-btn" data-choice="cases">Cases</button>
        <button class="opt-btn" data-choice="about">About Me</button>
      `;
      inner.appendChild(optRow);
      requestAnimationFrame(() => requestAnimationFrame(() => optRow.classList.add('visible')));

      optRow.addEventListener('click', (e) => {
        const btn = e.target.closest('.opt-btn');
        if (!btn) return;
        optRow.classList.add('chosen');
        const choice = btn.dataset.choice;
        setTimeout(() => {
          optRow.remove();
          if (choice === 'cases') {
            addUserMsg('Cases');
            sendToAI('Cases', () => {
              setTimeout(() => appendCaseCards(), 600);
            });
          } else {
            addUserMsg('About me');
            sendToAI('About me');
          }
        }, 350);
      });
    }

    // ─── Case cards (injected after AI responds about cases) ─────────────────
    function appendCaseCards() {
      const inner = document.getElementById('convoInner');
      const grid = document.createElement('div');
      grid.className = 'case-cards';
      grid.innerHTML = `
        <div class="case-card">
          <div class="case-card-img"></div>
          <div class="case-card-body">
            <p class="case-label">Case Study 01</p>
            <p class="case-title">Coming soon</p>
          </div>
        </div>
        <div class="case-card">
          <div class="case-card-img"></div>
          <div class="case-card-body">
            <p class="case-label">Case Study 02</p>
            <p class="case-title">Coming soon</p>
          </div>
        </div>
        <div class="case-card">
          <div class="case-card-img"></div>
          <div class="case-card-body">
            <p class="case-label">Case Study 03</p>
            <p class="case-title">Coming soon</p>
          </div>
        </div>
      `;
      inner.appendChild(grid);
      requestAnimationFrame(() => requestAnimationFrame(() => grid.classList.add('visible')));
      grid.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    // ─── Persistent chat input ────────────────────────────────────────────────
    function initChatInput() {
      if (document.getElementById('chatInputRow')) return;
      const wrap = document.createElement('div');
      wrap.id = 'chatInputRow';
      wrap.className = 'chat-input-row';
      wrap.innerHTML = `<input class="chat-input" id="chatInput" type="text" placeholder="ask me anything…" autocomplete="off" spellcheck="false" maxlength="300">`;
      document.body.appendChild(wrap);

      requestAnimationFrame(() => requestAnimationFrame(() => wrap.classList.add('visible')));

      document.getElementById('chatInput').addEventListener('keydown', (e) => {
        if (e.key !== 'Enter') return;
        const text = e.target.value.trim();
        if (!text || aiLocked) return;
        e.target.value = '';
        addUserMsg(text);
        sendToAI(text);
      });
    }

    // ─── Helpers ──────────────────────────────────────────────────────────────
    function safeHtml(text) {
      return text
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/\n/g,'<br>');
    }

    function esc(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>

</body>
